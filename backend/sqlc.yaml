version : "2"
sql :
  - engine : "postgresql"
    schema : "migrations"
    queries : "internal/storage/queries"
    gen :
      go : 
        package : "gen"
        out : "internal/storage/gen"
        sql_package : "pgx/v5"
        emit_json_tags : true
        emit_db_tags : true
        emit_prepared_queries : true
        emit_interface : true
        emit_exact_table_names : true
        emit_empty_slices : true
        emit_pointers_for_null_types : true
        overrides :
          - db_type : "uuid"
            go_type :
              type : "UUID"
              import : "github.com/google/uuid"
          - db_type : "uuid"
            nullable : true
            go_type :
              type : "UUID"
              import : "github.com/google/uuid"
              pointer : true
          - db_type : "timestamptz"
            go_type :
              type : "Time"
              import : "time" 
          - db_type : "citext"
            go_type : "string"
              